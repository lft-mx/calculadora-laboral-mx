<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Laboral México CHEVE CHEVE</title>
<script>
  const v = new Date().getTime();
  document.write('<link rel="stylesheet" href="css/styles.css?v=' + v + '">');
</script>
</head>

<body>

<header>
  <h1 id="titulo">Calculadora</h1>

  <div class="controls">

  <button id="modo-btn" onclick="toggleModo()">🌙</button>

  <div class="lang-switch" onclick="toggleIdioma()">
    <span class="lang es">🇲🇽</span>
    <span class="lang en">🇺🇸</span>
    <div class="slider"></div>
  </div>
</header>

<main>

  <section class="card">
    <h2 id="subtitulo"></h2>
  
    <!-- INPUTS -->
    <input type="number" id="salario" placeholder="Salario mensual">
    <input type="number" id="bonos" placeholder="Bonos / comisiones (opcional)">
    <input type="number" id="infonavit" placeholder="Descuento Infonavit (opcional)">
  
    <!-- BOTÓN -->
    <button class="btn" onclick="calcularSueldo()">Calcular</button>
  
    <!-- RESULTADO -->
    <div id="resultado"></div>
    <canvas id="grafica" style="margin-top:20px;"></canvas>
  </section>

  <section class="card ad" id="ad-text">
    Espacio publicitario
  </section>

</main>

<footer>
  <p>© 2026 LFT MX</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  const v = new Date().getTime();
  document.write('<script src="js/ui.js?v=' + v + '"><\/script>');
</script>

</body>
</html>
