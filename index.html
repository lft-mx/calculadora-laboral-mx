<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Laboral México</title>
<script>
  const v = new Date().getTime();
  document.write('<link rel="stylesheet" href="css/styles.css?v=' + v + '">');
</script>
</head>

<body>

<header>
  <h1 id="titulo">Calculadora</h1>

  <div class="controls">
    <button id="modo-btn" onclick="toggleModo()">🌙</button>

    <div class="lang-switch" onclick="toggleIdioma()">
      <span class="lang es">🇲🇽</span>
      <span class="lang en">🇺🇸</span>
      <div class="slider"></div>
    </div>
  </div>
</header>

<main>

  <section class="card">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="cambiarModo('bruto')">Sueldo bruto</button>
      <button class="tab" onclick="cambiarModo('neto')">Lo que recibo</button>
    </div>
  
    <h2 id="subtitulo"></h2>
  
    <!-- INPUTS BRUTO -->
      <!-- PERIODO (AHORA PRIMERO) -->
      <label>Periodo de pago 🗓️</label>
      <select id="periodo">
        <option value="mensual">Mensual</option>
        <option value="quincenal">Quincenal</option>
        <option value="semanal">Semanal</option>
      </select>
      
      <!-- SUELDO (AHORA SEGUNDO) -->
      <input type="number" id="salario" placeholder="Salario mensual" oninput="formatMoney(this)">
      
      <!-- DÍAS TRABAJADOS -->
      <label>Días trabajados 👷</label>
      <input type="number" id="dias" placeholder="Ej: 15 o 16">
    <input type="number" id="bonos" placeholder="Bonos / comisiones (opcional)" oninput="formatMoney(this)">
    <input type="number" id="infonavit" placeholder="Descuento Infonavit (opcional)" oninput="formatMoney(this)">
  
    <!-- INPUT NETO -->
    <input type="number" id="netoInput" placeholder="¿Cuánto te depositan?" style="display:none;" oninput="formatMoney(this)">
  
    <!-- BOTÓN -->
    <button class="btn" onclick="calcularSueldo()">Calcular</button>
  
    <!-- RESULTADO -->
    <div id="resultado"></div>
    <canvas id="grafica" style="margin-top:20px;"></canvas>
  
  </section>

</main>

<footer>
  <p>© 2026 LFT MX</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
